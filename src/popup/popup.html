<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>TabHavoc Cat Configuration</title>
</head>
<body style="width: 250px; font-family: Arial, sans-serif; padding: 10px;">
  <h2>TabHavoc Configuration</h2>
  
  <label for="havoc-interval-select">Inactivity Threshold:</label>
  <select id="havoc-interval-select">
    <option value="15">15 Minutes</option>
    <option value="30">30 Minutes</option>
    <option value="60">60 Minutes</option>
  </select>
  
  <br><br>
  <button id="feed-element-btn">Feed Web Element</button>

  <script src="popup.js"></script>
</body>
</html>
